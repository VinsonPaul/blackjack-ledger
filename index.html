<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="BlackjAck" />
<meta name="theme-color" content="#0d2818" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<title>Blackjack Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --felt: #0d2818;
    --felt-deep: #061410;
    --felt-light: #143a25;
    --gold: #d4a84b;
    --gold-bright: #f0c560;
    --cream: #f5ecd7;
    --cream-dim: #c9bfa8;
    --red: #c43028;
    --red-bright: #e8453c;
    --green: #2d8a4a;
    --green-bright: #5fc77a;
    --line: rgba(212, 168, 75, 0.25);
    --shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--felt-deep);
    color: var(--cream);
    font-family: 'Fraunces', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body {
    background:
      radial-gradient(ellipse at top, var(--felt) 0%, var(--felt-deep) 70%),
      var(--felt-deep);
    background-attachment: fixed;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(212,168,75,0.06) 1px, transparent 0);
    background-size: 20px 20px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative; z-index: 1;
    max-width: 520px; margin: 0 auto;
    padding: 20px 18px 80px;
  }

  header {
    text-align: center;
    padding: 16px 0 24px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 20px;
  }
  header h1 {
    font-family: 'Fraunces', serif; font-weight: 800;
    font-size: 32px; letter-spacing: -0.02em;
    color: var(--cream); font-style: italic;
  }
  header h1 .ace {
    color: var(--gold-bright); display: inline-block;
    transform: rotate(-6deg); font-style: normal;
  }
  header .sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.25em;
    color: var(--gold); text-transform: uppercase;
    margin-top: 6px;
  }

  .tabs {
    display: flex;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 4px;
    margin-bottom: 20px;
  }
  .tab {
    flex: 1; padding: 10px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--cream-dim);
    border-radius: 999px;
    cursor: pointer;
    background: transparent; border: none;
    transition: all 0.2s;
  }
  .tab.active { background: var(--gold); color: var(--felt-deep); font-weight: 600; }

  .panel { display: none; }
  .panel.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .section {
    background: rgba(20, 58, 37, 0.4);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 18px;
    margin-bottom: 16px;
    backdrop-filter: blur(8px);
  }
  .section h2 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section h2::before {
    content: ''; width: 6px; height: 6px;
    background: var(--gold); border-radius: 50%;
    display: inline-block;
  }

  input, select {
    width: 100%;
    padding: 12px 14px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--line);
    border-radius: 12px;
    color: var(--cream);
    font-family: 'Fraunces', serif;
    font-size: 16px;
    outline: none;
    transition: border 0.2s;
  }
  input:focus, select:focus { border-color: var(--gold); }
  input::placeholder { color: rgba(245, 236, 215, 0.4); }
  label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--cream-dim);
    margin-bottom: 6px;
  }

  .btn {
    display: inline-flex;
    align-items: center; justify-content: center;
    gap: 6px;
    padding: 12px 18px;
    background: var(--gold);
    color: var(--felt-deep);
    border: none; border-radius: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.1s;
    width: 100%;
  }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.ghost { background: transparent; color: var(--cream); border: 1px solid var(--line); }
  .btn.danger { background: var(--red); color: var(--cream); }
  .btn.green { background: var(--green); color: var(--cream); }
  .btn.sm { padding: 8px 12px; font-size: 10px; width: auto; }

  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }
  .mt { margin-top: 12px; }

  /* Players */
  .player-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    background: rgba(0,0,0,0.2);
    border-radius: 10px;
    margin-bottom: 6px;
  }
  .player-row .name { font-size: 17px; }
  .player-row .x {
    background: transparent; border: none;
    color: var(--red-bright);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
  }
  .add-player {
    display: flex; gap: 8px;
    margin-top: 10px;
  }
  .add-player input { flex: 1; }
  .add-player .btn { width: auto; padding: 12px 18px; }

  /* Round bar */
  .round-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    background: linear-gradient(135deg, rgba(212,168,75,0.15), rgba(212,168,75,0.05));
    border: 1px solid var(--line);
    border-radius: 14px;
    margin-bottom: 16px;
  }
  .round-bar .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--cream-dim);
  }
  .round-bar .value {
    font-family: 'Fraunces', serif;
    font-size: 22px; font-weight: 600;
    color: var(--gold-bright);
    font-style: italic;
  }
  .round-bar .right { text-align: right; }

  /* Score row (end-of-round entry) */
  .score-row {
    background: rgba(0,0,0,0.25);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .score-row.dealer {
    border-color: var(--gold);
    background: linear-gradient(135deg, rgba(212,168,75,0.12), rgba(0,0,0,0.25));
  }
  .score-row .head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .score-row .who {
    font-size: 17px;
    font-weight: 600;
  }
  .score-row.dealer .who {
    color: var(--gold-bright);
    font-style: italic;
  }
  .score-row .role {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--cream-dim);
    text-transform: uppercase;
  }

  .score-input {
    display: flex; gap: 8px;
    align-items: center;
  }
  .score-input input[type="number"] {
    flex: 1;
    -moz-appearance: textfield;
  }
  .score-input input::-webkit-outer-spin-button,
  .score-input input::-webkit-inner-spin-button {
    -webkit-appearance: none; margin: 0;
  }

  .flag-group {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }
  .flag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 7px 11px;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--cream-dim);
    cursor: pointer;
    user-select: none;
    transition: all 0.15s;
  }
  .flag.on {
    background: var(--gold);
    color: var(--felt-deep);
    border-color: var(--gold);
    font-weight: 600;
  }
  .flag.bust.on { background: var(--red); color: var(--cream); border-color: var(--red); }
  .flag.bj.on { background: var(--green-bright); color: var(--felt-deep); }
  .flag.disabled { opacity: 0.35; pointer-events: none; }

  .split-hand {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--line);
  }
  .split-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  /* Ledger */
  .ledger-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    background: rgba(0,0,0,0.25);
    border-radius: 12px;
    margin-bottom: 6px;
  }
  .ledger-row .name { font-size: 17px; }
  .ledger-row .amt {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 600;
  }
  .amt.pos { color: var(--green-bright); }
  .amt.neg { color: var(--red-bright); }
  .amt.zero { color: var(--cream-dim); }

  .settle-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    background: linear-gradient(90deg, rgba(212,168,75,0.1), transparent);
    border: 1px solid var(--line);
    border-radius: 12px;
    margin-bottom: 8px;
  }
  .settle-row .arrow { color: var(--gold); font-size: 18px; }
  .settle-row .amt {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    color: var(--gold-bright);
  }

  .history-item {
    padding: 12px 14px;
    background: rgba(0,0,0,0.2);
    border-radius: 10px;
    margin-bottom: 6px;
    font-size: 13px;
  }
  .history-item .num {
    font-family: 'JetBrains Mono', monospace;
    color: var(--gold);
    font-size: 10px;
    letter-spacing: 0.15em;
  }
  .history-item .detail {
    color: var(--cream-dim);
    margin-top: 4px;
    font-size: 12px;
  }

  .empty {
    text-align: center;
    color: var(--cream-dim);
    padding: 30px 20px;
    font-style: italic;
  }

  .divider {
    height: 1px;
    background: var(--line);
    margin: 14px 0;
  }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(120px);
    background: var(--gold);
    color: var(--felt-deep);
    padding: 12px 20px;
    border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    box-shadow: var(--shadow);
    transition: transform 0.3s;
    z-index: 200;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  small.hint {
    display: block;
    color: var(--cream-dim);
    font-size: 11px;
    margin-top: 6px;
    font-style: italic;
  }

  .banner-final {
    background: linear-gradient(135deg, var(--gold), var(--gold-bright));
    color: var(--felt-deep);
    padding: 16px 18px;
    border-radius: 14px;
    margin-bottom: 16px;
    text-align: center;
  }
  .banner-final .ttl {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 20px;
    font-weight: 700;
  }
  .banner-final .sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-backdrop.active { display: flex; }
  .modal {
    background: var(--felt);
    border: 1px solid var(--gold);
    border-radius: 18px;
    padding: 20px;
    max-width: 380px;
    width: 100%;
    box-shadow: var(--shadow);
  }
  .modal h3 {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 22px;
    margin-bottom: 10px;
    color: var(--gold-bright);
  }
</style>
</head>
<body>
<div class="app">

<header>
  <h1>black<span class="ace">A</span>jack</h1>
  <div class="sub">House Ledger · Tableside Edition</div>
</header>

<div class="tabs">
  <button class="tab active" data-tab="play">Play</button>
  <button class="tab" data-tab="ledger">Ledger</button>
  <button class="tab" data-tab="setup">Setup</button>
</div>

<div class="panel active" id="panel-play"><div id="play-content"></div></div>
<div class="panel" id="panel-ledger"><div id="ledger-content"></div></div>
<div class="panel" id="panel-setup"><div id="setup-content"></div></div>

<!-- Confirm modal -->
<div class="modal-backdrop" id="confirm-modal">
  <div class="modal">
    <h3 id="confirm-title">Are you sure?</h3>
    <p id="confirm-body" style="color: var(--cream-dim); margin-bottom: 16px; line-height: 1.4;"></p>
    <div class="row">
      <button class="btn ghost" id="confirm-cancel">Cancel</button>
      <button class="btn" id="confirm-ok">Confirm</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
const STORAGE_KEY = 'blackjack-ledger-v2';

const defaultState = () => ({
  players: [],          // [{id, name}]
  rounds: [],           // archived rounds
  ledger: {},           // {playerId: number} (cumulative running balance)
  game: null,           // { totalRounds, currentRound, finished }
  currentRound: null,   // active round being scored
});

let state = loadState() || defaultState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

// ============================================================
// HELPERS
// ============================================================
function uid() { return Math.random().toString(36).slice(2, 9); }
function playerName(id) {
  const p = state.players.find(p => p.id === id);
  return p ? p.name : '?';
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), 1800);
}

// In-app confirm modal (more reliable than browser confirm on iOS)
function askConfirm(title, body, onYes, okLabel = 'Confirm', okClass = 'btn') {
  const modal = document.getElementById('confirm-modal');
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-body').textContent = body || '';
  const okBtn = document.getElementById('confirm-ok');
  const cancelBtn = document.getElementById('confirm-cancel');
  okBtn.textContent = okLabel;
  okBtn.className = okClass;
  const close = () => {
    modal.classList.remove('active');
    okBtn.onclick = null;
    cancelBtn.onclick = null;
  };
  okBtn.onclick = () => { close(); onYes(); };
  cancelBtn.onclick = close;
  modal.classList.add('active');
}
function fmtMoney(n) {
  if (!n || Math.abs(n) < 0.005) return '0';
  const sign = n > 0 ? '+' : '';
  let s = n.toFixed(2);
  s = s.replace(/\.00$/, '').replace(/(\.\d)0$/, '$1');
  return sign + s;
}
function fmtMoneyPlain(n) {
  if (!n || Math.abs(n) < 0.005) return '0';
  let s = Math.abs(n).toFixed(2);
  s = s.replace(/\.00$/, '').replace(/(\.\d)0$/, '$1');
  return s;
}

// ============================================================
// TABS
// ============================================================
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('panel-' + t.dataset.tab).classList.add('active');
    render();
  });
});

// ============================================================
// SETUP ACTIONS
// ============================================================
function addPlayer() {
  const inp = document.getElementById('new-player-name');
  const name = inp.value.trim();
  if (!name) return;
  if (state.players.some(p => p.name.toLowerCase() === name.toLowerCase())) {
    toast('Name already exists');
    return;
  }
  state.players.push({ id: uid(), name });
  inp.value = '';
  saveState();
  render();
  setTimeout(() => document.getElementById('new-player-name')?.focus(), 0);
}

function removePlayer(id) {
  if (state.currentRound) { toast('Finish current round first'); return; }
  const inGame = state.game && !state.game.finished;
  askConfirm(
    'Remove player?',
    inGame ? 'Game in progress. Their ledger balance will remain.' : 'This will remove them from the player list.',
    () => {
      state.players = state.players.filter(p => p.id !== id);
      saveState();
      render();
    },
    'Remove',
    'btn danger'
  );
}

function startGame() {
  if (state.players.length < 2) {
    toast('Need at least 2 players');
    return;
  }
  const inp = document.getElementById('total-rounds');
  const n = parseInt(inp.value, 10);
  if (!n || n < 1 || n > 999) {
    toast('Enter a valid number of rounds');
    return;
  }
  state.game = { totalRounds: n, currentRound: 1, finished: false };
  state.currentRound = null;
  saveState();
  document.querySelector('[data-tab="play"]').click();
}

function endGameEarly() {
  if (!state.game || state.game.finished) return;
  askConfirm(
    'End game now?',
    'The game will finish and the final settlement will be shown.',
    () => {
      state.currentRound = null;
      state.game.finished = true;
      saveState();
      document.querySelector('[data-tab="ledger"]').click();
    },
    'End & Settle',
    'btn'
  );
}

function newGame() {
  askConfirm(
    'Start a new game?',
    'Ledger and history will be cleared. Players are kept.',
    () => {
      state.rounds = [];
      state.ledger = {};
      state.currentRound = null;
      state.game = null;
      saveState();
      render();
      document.querySelector('[data-tab="setup"]').click();
    },
    'New Game',
    'btn'
  );
}

function hardReset() {
  askConfirm(
    'Wipe everything?',
    'All players, history, ledger, and the current game will be erased. This cannot be undone.',
    () => {
      state = defaultState();
      saveState();
      render();
    },
    'Wipe All',
    'btn danger'
  );
}

// ============================================================
// ROUND LIFECYCLE
// ============================================================
function startRound() {
  const dealerSel = document.getElementById('dealer-select');
  const betInp = document.getElementById('bet-input');
  const dealerId = dealerSel.value;
  const bet = parseFloat(betInp.value);
  if (!dealerId) { toast('Pick a dealer'); return; }
  if (!bet || bet <= 0) { toast('Enter a valid bet'); return; }

  const dealer = {
    playerId: dealerId,
    score: null,
    bust: false,
    blackjack: false,
  };
  const players = state.players
    .filter(p => p.id !== dealerId)
    .map(p => ({
      playerId: p.id,
      hands: [{
        id: uid(),
        score: null,
        bust: false,
        blackjack: false,
        doubled: false,
        fromSplit: false,
      }],
    }));

  state.currentRound = {
    id: uid(),
    roundNumber: state.game.currentRound,
    dealerId,
    bet,
    dealer,
    players,
  };
  saveState();
  render();
}

function toggleSplit(playerIdx) {
  const r = state.currentRound;
  const ph = r.players[playerIdx];
  if (ph.hands.length === 1) {
    // Add a second hand
    ph.hands.push({
      id: uid(),
      score: null,
      bust: false,
      blackjack: false,
      doubled: false,
      fromSplit: true,
    });
    ph.hands[0].fromSplit = true;
    // Split hands can't be marked blackjack (natural BJ only on initial 2 cards)
    ph.hands[0].blackjack = false;
  } else {
    // Remove split → back to single hand
    ph.hands = [{
      id: uid(),
      score: ph.hands[0].score,
      bust: ph.hands[0].bust,
      blackjack: false,
      doubled: ph.hands[0].doubled,
      fromSplit: false,
    }];
  }
  saveState();
  render();
}

function toggleFlag(playerIdx, handIdx, flag) {
  const r = state.currentRound;
  const h = r.players[playerIdx].hands[handIdx];
  if (flag === 'bust') {
    h.bust = !h.bust;
    if (h.bust) { h.blackjack = false; }
  } else if (flag === 'blackjack') {
    if (h.fromSplit) return; // not allowed
    h.blackjack = !h.blackjack;
    if (h.blackjack) { h.bust = false; h.doubled = false; h.score = 21; }
  } else if (flag === 'doubled') {
    h.doubled = !h.doubled;
    if (h.doubled) h.blackjack = false;
  }
  saveState();
  render();
}

function toggleDealerBust() {
  const r = state.currentRound;
  r.dealer.bust = !r.dealer.bust;
  if (r.dealer.bust) r.dealer.blackjack = false;
  saveState();
  render();
}
function toggleDealerBJ() {
  const r = state.currentRound;
  r.dealer.blackjack = !r.dealer.blackjack;
  if (r.dealer.blackjack) { r.dealer.bust = false; r.dealer.score = 21; }
  saveState();
  render();
}

function setScore(target, value) {
  const r = state.currentRound;
  const v = value === '' ? null : parseInt(value, 10);
  if (target === 'dealer') {
    r.dealer.score = (isNaN(v) ? null : v);
  } else {
    const [pi, hi] = target.split(':').map(Number);
    r.players[pi].hands[hi].score = (isNaN(v) ? null : v);
  }
  // Don't full-render on every keystroke; only save
  saveState();
}

function cancelRound() {
  askConfirm(
    'Cancel this round?',
    'No ledger changes will be applied.',
    () => {
      state.currentRound = null;
      saveState();
      render();
    },
    'Cancel Round',
    'btn danger'
  );
}

function settleRound() {
  const r = state.currentRound;
  if (!r) return;

  // Validate: dealer must have a score or be bust
  if (!r.dealer.bust && (r.dealer.score === null || r.dealer.score === undefined)) {
    toast('Enter dealer score (or mark bust)');
    return;
  }
  // Each player hand must have score or bust or BJ
  for (let pi = 0; pi < r.players.length; pi++) {
    for (let hi = 0; hi < r.players[pi].hands.length; hi++) {
      const h = r.players[pi].hands[hi];
      if (!h.bust && !h.blackjack && (h.score === null || h.score === undefined)) {
        toast(`Enter score for ${playerName(r.players[pi].playerId)}${r.players[pi].hands.length > 1 ? ` hand ${hi+1}` : ''}`);
        return;
      }
    }
  }

  // Compute outcomes
  const dealerBust = r.dealer.bust;
  const dealerBJ = r.dealer.blackjack;
  const dealerTotal = dealerBust ? 0 : (r.dealer.score || 0);

  const results = [];
  let dealerNet = 0;

  for (const ph of r.players) {
    for (const h of ph.hands) {
      const handBet = r.bet * (h.doubled ? 2 : 1);
      const pBust = h.bust;
      const pBJ = h.blackjack && !h.fromSplit;
      const pTotal = pBust ? 0 : (h.score || 0);

      let outcome, delta;
      if (pBust) {
        outcome = 'lose'; delta = -handBet;
      } else if (pBJ && !dealerBJ) {
        outcome = 'bj'; delta = +r.bet * 1.5; // BJ pays 3:2 on original bet (BJ can't double)
      } else if (pBJ && dealerBJ) {
        outcome = 'push'; delta = 0;
      } else if (dealerBJ && !pBJ) {
        outcome = 'lose'; delta = -handBet;
      } else if (dealerBust) {
        outcome = 'win'; delta = +handBet;
      } else if (pTotal > dealerTotal) {
        outcome = 'win'; delta = +handBet;
      } else if (pTotal < dealerTotal) {
        outcome = 'lose'; delta = -handBet;
      } else {
        outcome = 'push'; delta = 0;
      }

      results.push({
        playerId: ph.playerId,
        score: pTotal,
        bust: pBust,
        blackjack: pBJ,
        doubled: h.doubled,
        fromSplit: h.fromSplit,
        bet: handBet,
        outcome,
        delta,
      });

      state.ledger[ph.playerId] = (state.ledger[ph.playerId] || 0) + delta;
      dealerNet -= delta;
    }
  }
  state.ledger[r.dealerId] = (state.ledger[r.dealerId] || 0) + dealerNet;

  state.rounds.push({
    id: r.id,
    roundNumber: r.roundNumber,
    dealerId: r.dealerId,
    bet: r.bet,
    dealerScore: dealerTotal,
    dealerBust: dealerBust,
    dealerBJ: dealerBJ,
    results,
    dealerNet,
    timestamp: Date.now(),
  });

  state.currentRound = null;

  // Advance game
  if (state.game.currentRound >= state.game.totalRounds) {
    state.game.finished = true;
  } else {
    state.game.currentRound++;
  }

  saveState();
  render();

  if (state.game.finished) {
    toast('Game complete');
    setTimeout(() => document.querySelector('[data-tab="ledger"]').click(), 600);
  } else {
    toast(`Round ${r.roundNumber} settled`);
  }
}

// ============================================================
// SETTLEMENT
// ============================================================
function computeSettlements() {
  const balances = state.players
    .map(p => ({ id: p.id, name: p.name, bal: Math.round((state.ledger[p.id] || 0) * 100) / 100 }))
    .filter(b => Math.abs(b.bal) > 0.005);
  const creditors = balances.filter(b => b.bal > 0).sort((a,b) => b.bal - a.bal);
  const debtors = balances.filter(b => b.bal < 0).map(b => ({ ...b, bal: -b.bal })).sort((a,b) => b.bal - a.bal);
  const txs = [];
  let i = 0, j = 0;
  while (i < debtors.length && j < creditors.length) {
    const d = debtors[i], c = creditors[j];
    const amt = Math.min(d.bal, c.bal);
    txs.push({ from: d.name, to: c.name, amount: amt });
    d.bal -= amt;
    c.bal -= amt;
    if (d.bal < 0.005) i++;
    if (c.bal < 0.005) j++;
  }
  return txs;
}

// ============================================================
// RENDER: PLAY
// ============================================================
function renderPlay() {
  const el = document.getElementById('play-content');
  const g = state.game;
  const r = state.currentRound;

  // No game in progress
  if (!g) {
    el.innerHTML = `
      <div class="section" style="text-align:center;">
        <h2>No game in progress</h2>
        <p style="color: var(--cream-dim); margin-bottom: 14px;">Head to Setup to add players and pick the number of rounds.</p>
        <button class="btn" onclick="document.querySelector('[data-tab=setup]').click()">Go to Setup</button>
      </div>
    `;
    return;
  }

  // Game finished
  if (g.finished) {
    el.innerHTML = `
      <div class="banner-final">
        <div class="ttl">Game complete</div>
        <div class="sub">${state.rounds.length} round${state.rounds.length !== 1 ? 's' : ''} played</div>
      </div>
      <div class="section" style="text-align:center;">
        <p style="color: var(--cream-dim); margin-bottom: 14px;">View the final settlement in the Ledger tab.</p>
        <button class="btn" onclick="document.querySelector('[data-tab=ledger]').click()">Show settlement</button>
        <div class="mt"></div>
        <button class="btn ghost" onclick="newGame()">Start new game</button>
      </div>
    `;
    return;
  }

  // Round in progress (being scored)
  if (r) {
    let html = `
      <div class="round-bar">
        <div>
          <div class="label">Round ${r.roundNumber} of ${g.totalRounds}</div>
          <div class="value">Dealer: ${playerName(r.dealerId)}</div>
        </div>
        <div class="right">
          <div class="label">Bet</div>
          <div class="value">${r.bet}</div>
        </div>
      </div>
      <div style="text-align:center; color:var(--cream-dim); font-size:13px; margin-bottom:12px; font-style:italic;">
        Enter everyone's final score, then settle.
      </div>
    `;

    // Dealer row
    html += `<div class="score-row dealer">
      <div class="head">
        <span class="who">${playerName(r.dealerId)}</span>
        <span class="role">Dealer</span>
      </div>
      <div class="score-input">
        <input type="number" inputmode="numeric" min="0" max="31"
          placeholder="Score"
          ${r.dealer.bust ? 'disabled' : ''}
          value="${r.dealer.score ?? ''}"
          oninput="setScore('dealer', this.value)" />
      </div>
      <div class="flag-group">
        <span class="flag bj ${r.dealer.blackjack ? 'on' : ''}" onclick="toggleDealerBJ()">Blackjack</span>
        <span class="flag bust ${r.dealer.bust ? 'on' : ''}" onclick="toggleDealerBust()">Bust</span>
      </div>
    </div>`;

    // Player rows
    for (let pi = 0; pi < r.players.length; pi++) {
      const ph = r.players[pi];
      const isSplit = ph.hands.length > 1;
      html += `<div class="score-row">
        <div class="head">
          <span class="who">${playerName(ph.playerId)}</span>
          <span class="role">Player</span>
        </div>`;

      for (let hi = 0; hi < ph.hands.length; hi++) {
        const h = ph.hands[hi];
        html += isSplit ? `<div class="split-hand"><div class="split-label">Hand ${hi+1}</div>` : (hi === 0 ? '' : '');
        html += `<div class="score-input">
          <input type="number" inputmode="numeric" min="0" max="31"
            placeholder="Score"
            ${h.bust || h.blackjack ? 'disabled' : ''}
            value="${h.score ?? ''}"
            oninput="setScore('${pi}:${hi}', this.value)" />
        </div>
        <div class="flag-group">
          <span class="flag bj ${h.blackjack ? 'on' : ''} ${h.fromSplit ? 'disabled' : ''}"
            onclick="toggleFlag(${pi}, ${hi}, 'blackjack')">Blackjack</span>
          <span class="flag ${h.doubled ? 'on' : ''} ${h.blackjack ? 'disabled' : ''}"
            onclick="toggleFlag(${pi}, ${hi}, 'doubled')">Double</span>
          ${hi === 0 ? `<span class="flag ${isSplit ? 'on' : ''}" onclick="toggleSplit(${pi})">Split</span>` : ''}
          <span class="flag bust ${h.bust ? 'on' : ''}"
            onclick="toggleFlag(${pi}, ${hi}, 'bust')">Bust</span>
        </div>`;
        html += isSplit ? `</div>` : '';
      }
      html += `</div>`;
    }

    html += `<button class="btn green" onclick="settleRound()">Settle round</button>
      <div class="mt"></div>
      <button class="btn ghost" onclick="cancelRound()">Cancel round</button>`;

    el.innerHTML = html;
    return;
  }

  // No round started yet — pick dealer + bet
  let html = `
    <div class="round-bar">
      <div>
        <div class="label">Next round</div>
        <div class="value">${g.currentRound} of ${g.totalRounds}</div>
      </div>
      <div class="right">
        <div class="label">Progress</div>
        <div class="value">${state.rounds.length} done</div>
      </div>
    </div>
    <div class="section">
      <h2>New Round</h2>
      <label>Dealer for this round</label>
      <select id="dealer-select">
        ${state.players.map(p => `<option value="${p.id}">${p.name}</option>`).join('')}
      </select>
      <div class="mt"></div>
      <label>Bet amount (everyone plays for this)</label>
      <input id="bet-input" type="number" inputmode="decimal" placeholder="10" />
      <div class="mt"></div>
      <button class="btn" onclick="startRound()">Deal Round ${g.currentRound}</button>
    </div>
    <div class="section">
      <button class="btn ghost" onclick="endGameEarly()">End game now &amp; settle</button>
    </div>
  `;
  el.innerHTML = html;
}

// ============================================================
// RENDER: LEDGER
// ============================================================
function renderLedger() {
  const el = document.getElementById('ledger-content');
  if (state.players.length === 0) {
    el.innerHTML = `<div class="empty">No players yet. Head to Setup.</div>`;
    return;
  }

  let html = '';

  // Final settlement banner if game is finished
  if (state.game && state.game.finished) {
    html += `<div class="banner-final">
      <div class="ttl">Final Settlement</div>
      <div class="sub">${state.rounds.length} round${state.rounds.length !== 1 ? 's' : ''} · time to pay up</div>
    </div>`;
  }

  // Running cumulative balances (always shown)
  html += `<div class="section"><h2>${state.game && state.game.finished ? 'Final Balances' : 'Running Balances'}</h2>`;
  if (state.rounds.length === 0) {
    html += `<div class="empty">No rounds played yet.</div>`;
  } else {
    for (const p of state.players) {
      const bal = state.ledger[p.id] || 0;
      const cls = bal > 0.005 ? 'pos' : bal < -0.005 ? 'neg' : 'zero';
      html += `<div class="ledger-row">
        <div class="name">${p.name}</div>
        <div class="amt ${cls}">${fmtMoney(bal)}</div>
      </div>`;
    }
    html += `<small class="hint">+ means owed money · − means owes money</small>`;
  }
  html += `</div>`;

  // Settlement (only when game ended OR no game in progress but rounds exist)
  const showSettlement = (state.game && state.game.finished) || (!state.game && state.rounds.length > 0);
  if (showSettlement && state.rounds.length > 0) {
    const txs = computeSettlements();
    html += `<div class="section"><h2>Who pays whom</h2>`;
    if (txs.length === 0) {
      html += `<div class="empty">All square. 🎉</div>`;
    } else {
      for (const t of txs) {
        html += `<div class="settle-row">
          <span><strong>${t.from}</strong></span>
          <span class="arrow">→</span>
          <span><strong>${t.to}</strong></span>
          <span class="amt">${fmtMoneyPlain(t.amount)}</span>
        </div>`;
      }
      html += `<small class="hint">Minimum-transactions split, like Tricount.</small>`;
    }
    html += `</div>`;
    // Also add new-game button when game is finished
    if (state.game && state.game.finished) {
      html += `<div class="section">
        <button class="btn" onclick="newGame()">Start new game</button>
        <small class="hint">Keeps players; clears ledger and history.</small>
      </div>`;
    }
  } else if (state.game && !state.game.finished && state.rounds.length > 0) {
    html += `<div class="section" style="text-align:center;">
      <h2>Settlement</h2>
      <p style="color:var(--cream-dim); font-style:italic;">Final who-pays-whom appears when the game ends.</p>
    </div>`;
  }

  // History
  if (state.rounds.length > 0) {
    html += `<div class="section"><h2>History</h2>`;
    const recent = [...state.rounds].reverse();
    for (const r of recent) {
      const dealerLabel = r.dealerBust ? 'BUST' : (r.dealerBJ ? 'BJ' : r.dealerScore);
      const hands = r.results.length;
      html += `<div class="history-item">
        <div><span class="num">#${r.roundNumber}</span> · Dealer: <strong>${playerName(r.dealerId)}</strong> (${dealerLabel}) · bet ${r.bet}</div>
        <div class="detail">${hands} hand${hands>1?'s':''} · dealer net ${fmtMoney(r.dealerNet)}</div>
      </div>`;
    }
    html += `</div>`;
  }

  el.innerHTML = html;
}

// ============================================================
// RENDER: SETUP
// ============================================================
function renderSetup() {
  const el = document.getElementById('setup-content');
  const inGame = state.game && !state.game.finished;

  let html = `<div class="section">
    <h2>Players</h2>`;
  if (state.players.length === 0) {
    html += `<div class="empty">No players yet — add some below.</div>`;
  } else {
    html += state.players.map(p => `
      <div class="player-row">
        <div class="name">${p.name}</div>
        <button class="x" onclick="removePlayer('${p.id}')">×</button>
      </div>
    `).join('');
  }
  html += `<div class="add-player">
    <input id="new-player-name" placeholder="Add a player…" maxlength="20" />
    <button class="btn" onclick="addPlayer()">Add</button>
  </div></div>`;

  // Game setup
  if (!inGame) {
    html += `<div class="section">
      <h2>Game</h2>
      <label>How many rounds?</label>
      <input id="total-rounds" type="number" inputmode="numeric" min="1" max="999"
        placeholder="e.g. 10" value="${state.game ? '' : '10'}" />
      <small class="hint">You can end early any time from the Play tab.</small>
      <div class="mt"></div>
      <button class="btn" onclick="startGame()">Start game</button>
    </div>`;
  } else {
    html += `<div class="section">
      <h2>Current Game</h2>
      <div style="font-size: 16px; margin-bottom: 8px;">
        Round <strong>${state.game.currentRound}</strong> of <strong>${state.game.totalRounds}</strong>
      </div>
      <small class="hint">Use the Play tab to continue. End-early lives there too.</small>
    </div>`;
  }

  html += `<div class="section">
    <h2>Reset</h2>
    ${state.game && !state.game.finished ? `
      <button class="btn danger" onclick="endGameEarly()">End game now &amp; settle</button>
      <div class="mt"></div>
    ` : ''}
    <button class="btn ghost" onclick="hardReset()">Wipe everything</button>
    <small class="hint">Clears players, history, ledger, and current game.</small>
  </div>`;

  el.innerHTML = html;

  // Bind Enter on player input
  const inp = document.getElementById('new-player-name');
  if (inp) {
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') addPlayer(); });
  }
}

function render() {
  renderPlay();
  renderLedger();
  renderSetup();
}

render();

// Register service worker for offline support (PWA)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch((err) => {
      console.warn('SW registration failed:', err);
    });
  });
}
</script>
